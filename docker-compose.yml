services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/configflow
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      JWT_EXPIRES_IN: 8h
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@configflow.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  mongo-data:
